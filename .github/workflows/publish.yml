name: Release

on:
  push:
    tags: ["v*.*.*"]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.metadata.outputs.tag }}
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - id: metadata
        name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must match vN.N.N, got: $tag" >&2
            exit 1
          fi

          crate_version="$(awk -F'"' '/^version = / { print $2; exit }' Cargo.toml)"
          if [[ -z "$crate_version" ]]; then
            echo "Failed to read crate version from Cargo.toml" >&2
            exit 1
          fi

          if [[ "$tag" != "v${crate_version}" ]]; then
            echo "Tag ${tag} does not match crate version v${crate_version}" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$crate_version" >> "$GITHUB_OUTPUT"

  publish-crate:
    needs: validate
    runs-on: ubuntu-24.04
    environment: crates-io
    permissions:
      contents: read
      id-token: write
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-publish-ubuntu-24.04-nightly
          cache-on-failure: true

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crate
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  build-binaries:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-13
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: windows-2025
            target: x86_64-pc-windows-msvc
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}-nightly
          cache-on-failure: true

      - name: Build release binary
        run: cargo build --locked --release

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          mkdir -p package
          cp target/release/forsmost package/forsmost
          chmod +x package/forsmost
          strip package/forsmost

          archive="forsmost-v${VERSION}-${{ matrix.target }}.tar.gz"
          tar -C package -czf "dist/${archive}" forsmost
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/${archive}" > "dist/${archive}.sha256"
          else
            shasum -a 256 "dist/${archive}" > "dist/${archive}.sha256"
          fi

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          New-Item -ItemType Directory -Force package | Out-Null
          Copy-Item target\release\forsmost.exe package\forsmost.exe

          $archive = "forsmost-v$env:VERSION-${{ matrix.target }}.zip"
          Push-Location package
          Compress-Archive -Path .\forsmost.exe -DestinationPath "..\$archive" -Force
          Pop-Location

          Move-Item -LiteralPath $archive -Destination "dist\$archive" -Force
          $hash = (Get-FileHash -Algorithm SHA256 "dist\$archive").Hash.ToLowerInvariant()
          "{0}  {1}" -f $hash, $archive | Out-File -FilePath "dist\$archive.sha256" -Encoding ascii

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  create-release:
    needs: [validate, publish-crate, build-binaries]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download packaged binaries
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          generate_release_notes: true
          files: dist/*
